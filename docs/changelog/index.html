    /* ── Signal header ── */
    .cl-signal {

    /* scan line animation */
    .cl-signal::before {
      content: '';
      position: absolute; top: 0; bottom: 0; width: 30%;
      background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--brand) 7%, transparent), transparent);
      animation: cl-scan 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes cl-scan { 0% { left: -35%; } 100% { left: 115%; } }

    .cl-signal-left { display: flex; align-items: center; gap: 0.55rem; color: var(--text2); }

      font-size: 0.5rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--brand); opacity: 0.6; font-weight: 700;
    }
    .cl-signal-sep { opacity: 0.25; }
    .cl-repo { color: var(--text); font-weight: 600; }
    .cl-branch {

    .cl-signal-right { display: flex; align-items: center; gap: 0.55rem; color: var(--text2); }
    .cl-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text2); flex-shrink: 0;
    }
    .cl-dot.connecting { background: var(--brand); animation: cl-blink 1s ease-in-out infinite; }
    .cl-dot.synced     { background: #4ade80; }
    .cl-dot.offline    { background: #f87171; }
    @keyframes cl-blink { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
    #cl-status { color: var(--text2); }
    #cl-rate { color: var(--text2); opacity: 0.45; font-size: 0.65rem; }

    /* ── Version block ── */
    .cl-vblock { margin-bottom: 2.25rem; }

    .cl-vhead {
      display: flex; align-items: center; gap: 0.6rem;
      flex-wrap: wrap; margin-bottom: 0.6rem;
    }
    .cl-vnum {
      font-family: var(--mono); font-size: 1.1rem; font-weight: 900;
      color: var(--brand); letter-spacing: -0.03em; line-height: 1;

    .cl-vdate {
      font-family: var(--mono); font-size: 0.67rem;
      color: var(--text2); opacity: 0.5;

    .cl-ghlink {
      margin-left: auto; display: inline-flex; align-items: center; gap: 0.3rem;

      transition: opacity 0.15s, color 0.15s;
    }
    .cl-ghlink:hover { opacity: 1; color: var(--brand); }

    /* ── Commit list (git graph) ── */
    .cl-commits {
      border: 1px solid var(--border);
      border-left: 2px solid color-mix(in oklch, var(--brand) 30%, transparent);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--bg2);
      overflow: hidden;
    }

    .cl-row {
      display: flex; align-items: center;
      border-bottom: 1px solid color-mix(in oklch, var(--border) 55%, transparent);
      cursor: default;
      transition: background 0.1s;
    }
    .cl-row:last-child { border-bottom: none; }
    .cl-row:hover { background: color-mix(in oklch, var(--brand) 4%, transparent); }

    /* graph column */
    .cl-gcol {
      width: 32px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      align-self: stretch; position: relative;
    }
    .cl-gcol::before {
      content: '';
      position: absolute; top: 0; bottom: 0; left: 50%;
      width: 1px;
      background: color-mix(in oklch, var(--brand) 18%, transparent);
      transform: translateX(-50%);

    .cl-row:last-child .cl-gcol::before { bottom: 50%; }

      width: 7px; height: 7px; border-radius: 50%; z-index: 1; position: relative;

      transition: background 0.12s, border-color 0.12s; flex-shrink: 0;
    }
    .cl-row:hover .cl-gdot { background: var(--brand); border-color: var(--brand); }

    /* commit body */
    .cl-body {
      flex: 1; min-width: 0; display: flex; align-items: center; gap: 0.55rem;
      padding: 0.48rem 0.9rem 0.48rem 0; font-size: 0.8rem;

    .cl-sha {

      letter-spacing: 0.02em;

    .cl-sha:hover { background: color-mix(in oklch, var(--brand) 22%, transparent); }

    .cl-av {

    .cl-msg {

    .cl-time {
      font-family: var(--mono); font-size: 0.63rem;

    /* ── Tooltip ── */
    .cl-tooltip {
      position: fixed; z-index: 9000;
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 2px solid var(--brand);
      border-radius: 0 var(--radius) var(--radius) 0;

      pointer-events: none;
      opacity: 0; transform: translateY(-2px);
      transition: opacity 0.12s, transform 0.12s;
      box-shadow: 0 6px 24px color-mix(in oklch, black 40%, transparent);
      font-size: 0.75rem;

  <script>
  (function () {
    'use strict';

    var REPO   = 'Binary-ly/zynaui';
    var GH     = 'https://github.com/' + REPO;
    var API    = 'https://api.github.com/repos/' + REPO;

    var feed    = document.getElementById('cl-feed');
    var skel    = document.getElementById('cl-skeleton');
    var dot     = document.getElementById('cl-dot');
    var stTxt   = document.getElementById('cl-status');
    var rateTxt = document.getElementById('cl-rate');
    var tooltip = document.getElementById('cl-tooltip');
    var ttBody  = document.getElementById('cl-tt-body');

    var hovRow = null, hovTimer = null;
    var cache  = {};
    var hasHover = window.matchMedia('(hover: hover)').matches;

    /* ─── helpers ────────────────────────────────────────────── */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function ea(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function ago(iso) {
      if (!iso) return '';
      var diff = Date.now() - new Date(iso).getTime();
      var d = Math.floor(diff / 86400000);
      var h = Math.floor(diff / 3600000);
      var m = Math.floor(diff / 60000);
      if (d > 90) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
      if (d > 0) return d + 'd ago';
      if (h > 0) return h + 'h ago';
      if (m > 0) return m + 'm ago';
      return 'just now';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    /* ─── status ─────────────────────────────────────────────── */
    function setStatus(state, label, rate) {
      dot.className = 'cl-dot ' + state;
      stTxt.textContent = label;
      if (rate) { rateTxt.textContent = rate; rateTxt.style.display = ''; }
    }

    /* ─── rendering ──────────────────────────────────────────── */
    function renderRow(c) {
      var sha  = c.sha || '';
      var s7   = sha.slice(0, 7);
      var msg  = ((c.commit && c.commit.message) || c.message || '').split('\n')[0];
      var date = (c.commit && c.commit.author && c.commit.author.date) || c.date || '';
      var av   = (c.author && c.author.avatar_url) || '';
      var aln  = (c.author && c.author.login) || '';

      return '<div class="cl-row" data-sha="' + ea(sha) + '" data-msg="' + ea(msg) + '" data-date="' + ea(date) + '" role="listitem">' +
        '<div class="cl-gcol" aria-hidden="true"><div class="cl-gdot"></div></div>' +
        '<div class="cl-body">' +
          '<a class="cl-sha" href="' + GH + '/commit/' + ea(sha) + '" target="_blank" rel="noopener noreferrer" tabindex="0" aria-label="View commit ' + esc(s7) + ' on GitHub">' + esc(s7) + '</a>' +
          (av ? '<img class="cl-av" src="' + ea(av) + '" alt="' + ea(aln) + '" width="16" height="16" loading="lazy">' : '') +
          '<span class="cl-msg" title="' + ea(msg) + '">' + esc(msg) + '</span>' +
          '<span class="cl-time">' + esc(ago(date)) + '</span>' +
        '</div>' +
      '</div>';
    }

    function renderGroup(g, isFirst) {
      var date    = '';
      if (g.commits.length) {
        date = (g.commits[0].commit && g.commits[0].commit.author && g.commits[0].commit.author.date)
             || g.commits[0].date || '';
      }

      var isBeta = g.ver.indexOf('beta') !== -1;
      var ghHref = g.sha ? (GH + '/releases/tag/' + ea(g.ver)) : (GH + '/commits/main');

      var pills = '';
      if (isFirst && !g.isPre) pills += '<span class="badge badge-success badge-pulse">LATEST</span>';
      if (isBeta)               pills += '<span class="badge badge-warning">BETA</span>';
      if (g.isPre)              pills += '<span class="badge badge-neutral">PRE-RELEASE</span>';

      return '<div class="cl-vblock">' +
        '<div class="cl-vhead">' +
          '<span class="cl-vnum">' + esc(g.ver) + '</span>' +
          (date ? '<span class="cl-vdate">' + esc(fmtDate(date)) + '</span>' : '') +
          pills +
          '<a class="cl-ghlink" href="' + ghHref + '" target="_blank" rel="noopener noreferrer" aria-label="View ' + esc(g.ver) + ' on GitHub">' +
            '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            'GitHub' +
          '</a>' +
        '</div>' +
        '<div class="cl-commits" role="list" aria-label="Commits in ' + esc(g.ver) + '">' +
          g.commits.map(renderRow).join('') +
        '</div>' +
      '</div>';
    }

    function render(groups) {
      if (!groups.length) {
        feed.innerHTML = '<p style="font-size:.8rem;color:var(--text2);padding:.5rem 0">No releases found.</p>';
        return;
      }
      feed.innerHTML = groups.map(function (g, i) { return renderGroup(g, i === 0); }).join('');
      if (hasHover) setupHovers();
    }

    /* ─── hover tooltip ──────────────────────────────────────── */
    function setupHovers() {
      document.querySelectorAll('.cl-row').forEach(function (row) {
        row.addEventListener('mouseenter', rowEnter);
        row.addEventListener('mouseleave', rowLeave);
      });
    }

    /* Render tooltip content — files=null means "loading", files=[] means "none" */
    function renderTtContent(msg, stats, files) {
      var html = '<div class="cl-tt-msg">' + esc(msg) + '</div>';
      if (stats) {
        html += '<div class="cl-tt-stats">' +
          '<span class="cl-tt-add">+' + stats.additions + '</span>' +
          '<span class="cl-tt-sep"> / </span>' +
          '<span class="cl-tt-del">−' + stats.deletions + '</span>' +
          '<span class="cl-tt-total"> · ' + stats.total + ' change' + (stats.total !== 1 ? 's' : '') + '</span>' +
        '</div>';
      }
      if (files && files.length) {
        html += '<div class="cl-tt-files">' +
          files.slice(0, 5).map(function (f) { return '<span class="cl-tt-file">↳ ' + esc(f.filename || f) + '</span>'; }).join('') +
        '</div>';
      } else if (files === null) {
        html += '<div class="cl-tt-loading" style="font-size:0.65rem;margin-top:0.2rem">Loading files…</div>';
      }
      ttBody.innerHTML = html;
    }

    function rowEnter(e) {
      var row  = e.currentTarget;
      hovRow   = row;
      var rect = row.getBoundingClientRect();
      var left = Math.max(8, Math.min(rect.left, window.innerWidth - 348));
      var top  = rect.bottom + 6;
      if (top + 160 > window.innerHeight) top = rect.top - 170;
      tooltip.style.left = left + 'px';
      tooltip.style.top  = top + 'px';
      tooltip.setAttribute('aria-hidden', 'false');

      var sha    = row.dataset.sha;
      var msg    = row.dataset.msg;
      var cached = cache[sha];

      if (cached && cached.stats) {
        // Stats pre-cached from compare — show immediately, lazy-load files if needed
        tooltip.classList.add('visible');
        renderTtContent(msg, cached.stats, cached.files || null);
        if (!cached.files) {
          clearTimeout(hovTimer);
          hovTimer = setTimeout(function () {
            if (hovRow !== row) return;
            loadDetail(sha).then(function (d) {
              if (hovRow !== row) return;
              renderTtContent(msg, cache[sha].stats, cache[sha].files || []);
            });
          }, 280);
        }
      } else {
        // No cached stats — full fetch with loading state
        ttBody.innerHTML = '<div class="cl-tt-msg">' + esc(msg) + '</div><div class="cl-tt-loading">Fetching diff stats…</div>';
        tooltip.classList.add('visible');
        clearTimeout(hovTimer);
        hovTimer = setTimeout(function () {
          if (hovRow !== row) return;
          loadDetail(sha).then(function (d) {
            if (hovRow !== row) return;
            if (d && d.stats) renderTtContent(msg, d.stats, d.files || []);
            else ttBody.innerHTML = '<div class="cl-tt-msg">' + esc(msg) + '</div>';
          });
        }, 280);
      }
    }

    function rowLeave() {
      hovRow = null;
      clearTimeout(hovTimer);
      tooltip.classList.remove('visible');
      tooltip.setAttribute('aria-hidden', 'true');
    }

    function loadDetail(sha) {
      var cached = cache[sha];
      // Full cache hit (has both stats and files already fetched)
      if (cached && cached.files) return Promise.resolve(cached);
      // Partial or miss — fetch individual commit to get files (and stats if missing)
      return fetch(API + '/commits/' + sha)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d) return cached || null;
          cache[sha] = { stats: d.stats, files: d.files || [] };
          return cache[sha];
        })
        .catch(function () { return cached || null; });
    }

    /* ─── static fallback ────────────────────────────────────── */
    function renderFallback() {
      try {
        var raw  = document.getElementById('cl-static').textContent;
        var data = JSON.parse(raw);
        var groups = data.releases.map(function (r) {
          return {
            ver:      r.version,
            sha:      r.tagSha || null,
            isPre:    !!r.isInitial && !r.commits.length,
            commits:  r.commits.map(function (c) {
              return { sha: c.sha, commit: { message: c.message, author: { date: c.date } }, author: null };
            })
          };
        });
        render(groups);
      } catch (err) {
        feed.innerHTML = '<p style="font-size:.8rem;color:var(--text2);padding:.5rem 0">Failed to load changelog.</p>';
      }
    }

    /* ─── init ───────────────────────────────────────────────── */
    function init() {
      setStatus('connecting', 'Connecting');

      // SHA of the very first commit — used as base for the oldest version's compare range
      var INITIAL_SHA = 'a55abca418ac435c1c2731c2df4a803d96c6cc05';
      var rateRem, rateLim;

      function readRate(res) {
        rateRem = res.headers.get('X-RateLimit-Remaining') || rateRem;
        rateLim = res.headers.get('X-RateLimit-Limit')     || rateLim;
        return res;
      }

      function checkOk(res) {
        readRate(res);
        if (!res.ok) {
          var err = new Error('API error');
          err.rateLimited = rateRem === '0';
          throw err;
        }
        return res;
      }

      // Fetch one compare range, pre-populate stats cache, return commits newest-first
      function fetchCompare(base, head) {
        return fetch(API + '/compare/' + base + '...' + head)
          .then(checkOk)
          .then(function (r) { return r.json(); })
          .then(function (data) {
            (data.commits || []).forEach(function (c) {
              // Pre-populate stats — only if not already fully cached
              if (c.stats && !(cache[c.sha] && cache[c.sha].files)) {
                cache[c.sha] = cache[c.sha]
                  ? Object.assign(cache[c.sha], { stats: c.stats })
                  : { stats: c.stats };
              }
            });
            // Compare returns oldest-first; reverse to newest-first
            return (data.commits || []).slice().reverse();
          });
      }

      // Step 1: fetch tags, then step 2: one compare per version (sequential = rate-limit friendly)
      fetch(API + '/tags?per_page=30')
        .then(checkOk)
        .then(function (r) { return r.json(); })
        .then(function (tags) {
          var groups  = [];
          var chain   = Promise.resolve();

          // Unreleased commits after the newest tag (if any)
          if (tags.length) {
            chain = chain.then(function () {
              return fetchCompare(tags[0].commit.sha, 'HEAD').then(function (commits) {
                if (commits.length) groups.push({ ver: 'Unreleased', sha: null, commits: commits });
              });
            });
          }

          // One compare per tag: from previous tag (or initial commit) up to this tag
          tags.forEach(function (tag, i) {
            var base = tags[i + 1] ? tags[i + 1].commit.sha : INITIAL_SHA;
            chain = chain.then(function () {
              return fetchCompare(base, tag.commit.sha).then(function (commits) {
                groups.push({ ver: tag.name, sha: tag.commit.sha, commits: commits });
              });
            });
          });

          // If no tags at all, show everything as a single unreleased block
          if (!tags.length) {
            chain = fetchCompare(INITIAL_SHA, 'HEAD').then(function (commits) {
              groups.push({ ver: 'HEAD', sha: null, commits: commits });
            });
          }

          return chain.then(function () {
            if (groups.length) groups[0].isLatest = true;
            return groups;
          });
        })
        .then(function (groups) {
          var rateStr = (rateRem && rateLim) ? rateRem + '/' + rateLim + ' req' : '';
          setStatus('synced', 'Synced', rateStr);
          render(groups);
        })
        .catch(function (err) {
          var msg = (err && err.rateLimited) ? 'Rate limited · cached data' : 'Offline · cached data';
          setStatus('offline', msg);
          var note = document.createElement('div');
          note.className = 'cl-offline-note';
          note.textContent = err && err.rateLimited
            ? 'GitHub API rate limit reached — showing last known state. Resets hourly.'
            : 'GitHub API unavailable — showing last known state.';
          feed.insertBefore(note, feed.firstChild);
          renderFallback();
        });
    }

    init();
  })();
  </script>
</body>
</html>
