name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push docs/ to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin deploy 2>/dev/null || true
          git subtree split --prefix docs -b deploy-tmp
          git push origin deploy-tmp:deploy --force
          git branch -D deploy-tmp
