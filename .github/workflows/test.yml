name: Test
on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: npm ci
      - run: npm run test:plugin
      - run: npm run test:charts
