  (function () {
    'use strict';

    var REPO   = 'Binary-ly/zynaui';

    var hovRow = null, hovTimer = null;
    var cache  = {};

    /* ─── helpers ────────────────────────────────────────────── */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function ea(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function ago(iso) {
      if (!iso) return '';
      var diff = Date.now() - new Date(iso).getTime();
      var d = Math.floor(diff / 86400000);
      var h = Math.floor(diff / 3600000);
      var m = Math.floor(diff / 60000);
      if (d > 90) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
      if (d > 0) return d + 'd ago';
      if (h > 0) return h + 'h ago';
      if (m > 0) return m + 'm ago';
      return 'just now';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    /* ─── status ─────────────────────────────────────────────── */
    function setStatus(state, label, rate) {
      dot.className = 'cl-dot ' + state;
      stTxt.textContent = label;
      if (rate) { rateTxt.textContent = rate; rateTxt.style.display = ''; }
    }

    /* ─── group commits by version tags ─────────────────────── */
    function groupByTags(tags, commits) {
      if (!tags.length) {
        return [{ ver: 'v0.1.1', commits: commits, isLatest: true }];
      }

      // Map sha → index in commits array
      var shaMap = {};
      commits.forEach(function (c, i) { shaMap[c.sha] = i; });

      // Resolve tag positions (tags may not appear if older than paged window)
      var markers = tags
        .map(function (t) { return { name: t.name, sha: t.commit.sha, i: shaMap[t.commit.sha] }; })
        .filter(function (m) { return m.i != null; })
        .sort(function (a, b) { return a.i - b.i; }); // newest first = smallest index

      var groups = [];
      var start  = 0;

      markers.forEach(function (m, mi) {
        groups.push({
          ver:      m.name,
          sha:      m.sha,
          isLatest: start === 0,
          commits:  commits.slice(start, m.i + 1)
        });
        start = m.i + 1;
      });

      // Commits before the oldest visible tag
      if (start < commits.length) {
        groups.push({ ver: 'Pre-release', commits: commits.slice(start), isPre: true });
      }

      return groups;
    }

    /* ─── rendering ──────────────────────────────────────────── */
    function renderRow(c) {
      var sha  = c.sha || '';
      var s7   = sha.slice(0, 7);
      var msg  = ((c.commit && c.commit.message) || c.message || '').split('\n')[0];
      var date = (c.commit && c.commit.author && c.commit.author.date) || c.date || '';
      var av   = (c.author && c.author.avatar_url) || '';
      var aln  = (c.author && c.author.login) || '';

      return '<div class="cl-row" data-sha="' + ea(sha) + '" data-msg="' + ea(msg) + '" data-date="' + ea(date) + '" role="listitem">' +
        '<div class="cl-gcol" aria-hidden="true"><div class="cl-gdot"></div></div>' +
        '<div class="cl-body">' +
          '<a class="cl-sha" href="' + GH + '/commit/' + ea(sha) + '" target="_blank" rel="noopener noreferrer" tabindex="0" aria-label="View commit ' + esc(s7) + ' on GitHub">' + esc(s7) + '</a>' +
          (av ? '<img class="cl-av" src="' + ea(av) + '" alt="' + ea(aln) + '" width="16" height="16" loading="lazy">' : '') +
          '<span class="cl-msg" title="' + ea(msg) + '">' + esc(msg) + '</span>' +
          '<span class="cl-time">' + esc(ago(date)) + '</span>' +
        '</div>' +
      '</div>';
    }

    function renderGroup(g, isFirst) {
      var date    = '';
      if (g.commits.length) {
        date = (g.commits[0].commit && g.commits[0].commit.author && g.commits[0].commit.author.date)
             || g.commits[0].date || '';
      }

      var isBeta = g.ver.indexOf('beta') !== -1;
      var ghHref = g.sha ? (GH + '/releases/tag/' + ea(g.ver)) : (GH + '/commits/main');

      var pills = '';
      if (isFirst && !g.isPre) pills += '<span class="badge badge-success badge-pulse">LATEST</span>';
      if (isBeta)               pills += '<span class="badge badge-warning">BETA</span>';
      if (g.isPre)              pills += '<span class="badge badge-neutral">PRE-RELEASE</span>';

      return '<div class="cl-vblock">' +
        '<div class="cl-vhead">' +
          '<span class="cl-vnum">' + esc(g.ver) + '</span>' +
          (date ? '<span class="cl-vdate">' + esc(fmtDate(date)) + '</span>' : '') +
          pills +
          '<a class="cl-ghlink" href="' + ghHref + '" target="_blank" rel="noopener noreferrer" aria-label="View ' + esc(g.ver) + ' on GitHub">' +
            '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            'GitHub' +
          '</a>' +
        '</div>' +
        '<div class="cl-commits" role="list" aria-label="Commits in ' + esc(g.ver) + '">' +
          g.commits.map(renderRow).join('') +
        '</div>' +
      '</div>';
    }

    function render(groups) {
      if (!groups.length) {
        feed.innerHTML = '<p style="font-size:.8rem;color:var(--text2);padding:.5rem 0">No releases found.</p>';
        return;
      }
      feed.innerHTML = groups.map(function (g, i) { return renderGroup(g, i === 0); }).join('');
      if (hasHover) setupHovers();
    }

    /* ─── hover tooltip ──────────────────────────────────────── */
    function setupHovers() {
      document.querySelectorAll('.cl-row').forEach(function (row) {
        row.addEventListener('mouseenter', rowEnter);
        row.addEventListener('mouseleave', rowLeave);
      });
    }

    function rowEnter(e) {
      var row  = e.currentTarget;
      hovRow   = row;
      var rect = row.getBoundingClientRect();
      var left = Math.max(8, Math.min(rect.left, window.innerWidth - 348));
      var top  = rect.bottom + 6;
      if (top + 160 > window.innerHeight) top = rect.top - 170;
      tooltip.style.left = left + 'px';
      tooltip.style.top  = top + 'px';
      tooltip.setAttribute('aria-hidden', 'false');

      var msg = row.dataset.msg;
      ttBody.innerHTML = '<div class="cl-tt-msg">' + esc(msg) + '</div><div class="cl-tt-loading">Fetching diff stats…</div>';
      tooltip.classList.add('visible');

      clearTimeout(hovTimer);
      hovTimer = setTimeout(function () {
        if (hovRow !== row) return;
        loadDetail(row.dataset.sha).then(function (d) {
          if (hovRow !== row) return;
          if (d && d.stats) {
            var files = (d.files || []).slice(0, 5);
            ttBody.innerHTML =
              '<div class="cl-tt-msg">' + esc(msg) + '</div>' +
              '<div class="cl-tt-stats">' +
                '<span class="cl-tt-add">+' + d.stats.additions + '</span>' +
                '<span class="cl-tt-sep"> / </span>' +
                '<span class="cl-tt-del">−' + d.stats.deletions + '</span>' +
                '<span class="cl-tt-total"> · ' + d.stats.total + ' change' + (d.stats.total !== 1 ? 's' : '') + '</span>' +
              '</div>' +
              (files.length
                ? '<div class="cl-tt-files">' + files.map(function (f) { return '<span class="cl-tt-file">↳ ' + esc(f.filename) + '</span>'; }).join('') + '</div>'
                : '');
          } else {
            ttBody.innerHTML = '<div class="cl-tt-msg">' + esc(msg) + '</div>';
          }
        });
      }, 280);
    }

    function rowLeave() {
      hovRow = null;
      clearTimeout(hovTimer);
      tooltip.classList.remove('visible');
      tooltip.setAttribute('aria-hidden', 'true');
    }

    function loadDetail(sha) {
      if (cache[sha]) return Promise.resolve(cache[sha]);
      return fetch(API + '/commits/' + sha)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d) return null;
          var detail = { stats: d.stats, files: d.files || [] };
          cache[sha] = detail;
          return detail;
        })
        .catch(function () { return null; });
    }

    /* ─── static fallback ────────────────────────────────────── */
    function renderFallback() {
      try {
        var raw  = document.getElementById('cl-static').textContent;
        var data = JSON.parse(raw);
        var groups = data.releases.map(function (r) {
          return {
            ver:      r.version,
            sha:      r.tagSha || null,
            isPre:    !!r.isInitial && !r.commits.length,
            commits:  r.commits.map(function (c) {
              return { sha: c.sha, commit: { message: c.message, author: { date: c.date } }, author: null };
            })
          };
        });
        render(groups);
      } catch (err) {
        feed.innerHTML = '<p style="font-size:.8rem;color:var(--text2);padding:.5rem 0">Failed to load changelog.</p>';
      }
    }

    /* ─── init ───────────────────────────────────────────────── */
    function init() {
      setStatus('connecting', 'Connecting');

      var tagsUrl    = API + '/tags?per_page=30';
      var commitsUrl = API + '/commits?per_page=100';
      var rateRem, rateLim;

      Promise.all([fetch(tagsUrl), fetch(commitsUrl)])
        .then(function (responses) {
          var tr = responses[0], cr = responses[1];
          // Read rate limit headers before potentially throwing (available even on 403)
          rateRem = tr.headers.get('X-RateLimit-Remaining') || cr.headers.get('X-RateLimit-Remaining');
          rateLim = tr.headers.get('X-RateLimit-Limit')     || cr.headers.get('X-RateLimit-Limit');
          if (!tr.ok || !cr.ok) {
            var err = new Error('API error');
            err.rateLimited = rateRem === '0';
            throw err;
          }
          return Promise.all([tr.json(), cr.json()]);
        })
        .then(function (data) {
          var tags    = data[0];
          var commits = data[1];
          var rateStr = (rateRem && rateLim) ? rateRem + '/' + rateLim + ' req' : '';
          setStatus('synced', 'Synced', rateStr);
          render(groupByTags(tags, commits));
        })
        .catch(function (err) {
          var msg = (err && err.rateLimited) ? 'Rate limited · cached data' : 'Offline · cached data';
          setStatus('offline', msg);
          var note = document.createElement('div');
          note.className = 'cl-offline-note';
          note.textContent = err && err.rateLimited
            ? 'GitHub API rate limit reached — showing last known state. Resets hourly.'
            : 'GitHub API unavailable — showing last known state.';
          feed.insertBefore(note, feed.firstChild);
          renderFallback();
        });
    }

    init();
  })();
  </script>
</body>
</html>
